name: OVMDivePlanner
options:
  bundleIdPrefix: com.ovmdiver
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  OVMDivePlanner:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - OVMDivePlanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ovmdiver.OVMDivePlanner
        INFOPLIST_FILE: OVMDivePlanner/Info.plist
        DEVELOPMENT_TEAM: ""
    info:
      path: OVMDivePlanner/Info.plist
      properties:
        CFBundleDisplayName: OVM Dive Planner
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
