name: OVMDivePlanner
options:
  bundleIdPrefix: com.ovm.OVMDivePlanner
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  OVMDivePlanner:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - OVMDivePlanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ovm.OVMDivePlanner.OVMDivePlanner
        INFOPLIST_FILE: OVMDivePlanner/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "DKA242B3QX"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: OVMDivePlanner/Info.plist
      properties:
        CFBundleDisplayName: OVM Dive Planner
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  OVMDivePlannerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - OVMDivePlannerTests
    dependencies:
      - target: OVMDivePlanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ovm.OVMDivePlanner.OVMDivePlannerTests
        GENERATE_INFOPLIST_FILE: YES
